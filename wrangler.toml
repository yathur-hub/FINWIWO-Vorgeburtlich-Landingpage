# Cloudflare Workers configuration for Finwiwo Vorgeburtlich Landingpage
name = "finwiwo-vorgeburtlich-landingpage"
main = "src/worker.ts"
compatibility_date = "2024-04-03"

[assets]
directory = "./dist"
binding = "ASSETS"

# Local environment variables for wrangler dev / testing
[vars]
# CLEVA_API_KEY can be set here for dev or via .dev.vars during wrangler dev.
# In production, set CLEVA_API_KEY as a Secret via the Cloudflare dashboard or wrangler secret put.
